appId: com.hyawara.scoop-ui
productName: Scoop-UI
copyright: Copyright © 2025 hyawara
directories:
  output: release
  buildResources: resources
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
  compression: maximum
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: false
  installDir: $PROGRAMFILES\Scoop-UI
  include: build/installer.nsh
  differentialPackage: true
publish:
  - provider: github
    owner: hyawara
    repo: scoop-ui
    releaseType: release
    draft: false
files:
  - dist/**/*
