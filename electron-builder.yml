appId: com.scoop-ui.app
productName: Scoop-UI
copyright: Copyright © 2025 hyawara
directories:
  output: release
files:
  - dist/**/*
  - package.json
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icons/icon.ico
  compression: normal
nsis:
  oneClick: true
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: false
  createStartMenuShortcut: false
  differentialPackage: true
publish:
  - provider: github
    owner: hyawara
    repo: scoop-ui
    releaseType: release
