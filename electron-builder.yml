appId: com.hyawara.scoop-ui
productName: Scoop UI
copyright: Copyright © 2025 hyawara
directories:
  output: release
  buildResources: resources
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
  icon: resources/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: false
  installDir: $PROGRAMFILES\Scoop-UI
files:
  - dist/**/*
