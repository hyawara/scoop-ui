name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm approve-builds --all
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - run: pnpm install --frozen-lockfile
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - name: Build source
        run: pnpm run build

      # electron-builder 打包 NSIS 安装包，并生成差分更新所需的
      # latest.yml + *.blockmap，再通过 publish 配置(github)自动
      # 创建 Release 并上传全部产物。electron-updater 依赖这些文件工作。
      - name: Package & Publish
        run: pnpm electron-builder --win --x64 --publish always
        env:
          GH_TOKEN: ${{ github.token }}
          LOCALAPPDATA: ${{ runner.temp }}/local-app-data
